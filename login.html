{% extends 'base.html' %}
{% block title %}Login – Student Portal{% endblock %}
{% block content %}

<style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    main { width: 100%; max-width: 420px; padding: 1.5rem; }

    .auth-logo {
        text-align: center;
        margin-bottom: 2rem;
    }
    .auth-logo .symbol {
        font-size: 2.5rem;
        display: block;
        margin-bottom: 8px;
    }
    .auth-logo h1 {
        font-family: 'Space Mono', monospace;
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--accent);
    }
    .auth-logo p { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

    .auth-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 0 40px rgba(59,130,246,0.08);
    }

    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.85rem;
        color: var(--text-muted);
    }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    .btn-primary { width: 100%; justify-content: center; padding: 12px; font-size: 0.95rem; margin-top: 0.5rem; }

    .divider {
        display: flex; align-items: center; gap: 12px;
        margin: 1.25rem 0; color: var(--text-muted); font-size: 0.8rem;
    }
    .divider::before, .divider::after {
        content: ''; flex: 1; height: 1px; background: var(--border);
    }
</style>

<div class="auth-logo">
    <span class="symbol">◈</span>
    <h1>StudentPortal</h1>
    <p>Academic Management System</p>
</div>

<div class="auth-card">
    <div class="card-title" style="justify-content: center; border: none; margin-bottom: 1.5rem;">Sign in to your account</div>

    {% if msg %}
    <div class="alert alert-danger">{{ msg }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary">Sign In →</button>
    </form>

    <div class="divider">or</div>

    <div class="auth-footer">
        Don't have an account?
        <a href="{{ url_for('signup') }}">Create one now</a>
    </div>
</div>

{% endblock %}
